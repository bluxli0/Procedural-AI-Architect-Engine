name: Build Geode Mod (Debug + Slim, Geode v5)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows (Win64)
          - { name: Windows-Debug, os: windows-latest, target: Win64,    flavor: debug }
          - { name: Windows-Slim,  os: windows-latest, target: Win64,    flavor: slim  }
          # Android32
          - { name: Android32-Debug, os: ubuntu-latest, target: Android32, flavor: debug }
          - { name: Android32-Slim,  os: ubuntu-latest, target: Android32, flavor: slim  }
          # Android64
          - { name: Android64-Debug, os: ubuntu-latest, target: Android64, flavor: debug }
          - { name: Android64-Slim,  os: ubuntu-latest, target: Android64, flavor: slim  }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: latest                             # 👈 pin Geode v5 from the action
          target: ${{ matrix.target }}            # maps to --platform
          build-config: ${{ matrix.flavor == 'debug' && 'RelWithDebInfo' || 'Release' }}
          use-lto:      ${{ matrix.flavor == 'slim' }}  # Slim = LTO on, Debug = off
          export-pdb:   ${{ matrix.target == 'Win64' && matrix.flavor == 'debug' }}
          bundle-pdb:   ${{ matrix.target == 'Win64' && matrix.flavor == 'debug' }}
          export-debug: ${{ startsWith(matrix.target, 'Android') && matrix.flavor == 'debug' }}
          combine: true

      - name: Upload .geode
        uses: actions/upload-artifact@v4
        with:
          name: geode-${{ matrix.name }}
          path: ${{ steps.build.outputs.build-output }}/*.geode

  package-debug:
    name: Package Debug Pack
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - run: sudo apt-get update && sudo apt-get install -y jq
      - id: meta
        run: |
          NAME=$(jq -r '.name' mod.json | tr ' ' '_' )
          VER=$(jq -r '.version' mod.json | sed 's/^v//')
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "ver=$VER" >> $GITHUB_OUTPUT
      - run: |
          mkdir -p release-debug
          cp -f about.md release-debug/ 2>/dev/null || true
          cp -f changelog.md release-debug/ 2>/dev/null || true
          for a in artifacts/*-Debug; do
            [ -d "$a" ] || continue
            for f in "$a"/*.geode; do
              base=$(basename "$a")
              cp "$f" "release-debug/${{ steps.meta.outputs.name }}_${{ steps.meta.outputs.ver }}_${base}.geode"
            done
          done
          [ -d resources ] && cp -r resources release-debug/resources || true
      - run: |
          cd release-debug
          zip -r "${{ steps.meta.outputs.name }}_${{ steps.meta.outputs.ver }}_Debug_Pack.zip" ./*
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.name }}_${{ steps.meta.outputs.ver }}_Debug_Pack
          path: release-debug/*.zip

  package-slim:
    name: Package Slim Pack
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - run: sudo apt-get update && sudo apt-get install -y jq
      - id: meta
        run: |
          NAME=$(jq -r '.name' mod.json | tr ' ' '_' )
          VER=$(jq -r '.version' mod.json | sed 's/^v//')
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "ver=$VER" >> $GITHUB_OUTPUT
      - run: |
          mkdir -p release-slim
          cp -f about.md release-slim/ 2>/dev/null || true
          cp -f changelog.md release-slim/ 2>/dev/null || true
          for a in artifacts/*-Slim; do
            [ -d "$a" ] || continue
            for f in "$a"/*.geode; do
              base=$(basename "$a")
              cp "$f" "release-slim/${{ steps.meta.outputs.name }}_${{ steps.meta.outputs.ver }}_${base}.geode"
            done
          done
          [ -d resources ] && cp -r resources release-slim/resources || true
      - run: |
          cd release-slim
          zip -r "${{ steps.meta.outputs.name }}_${{ steps.meta.outputs.ver }}_Slim_Pack.zip" ./*
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.name }}_${{ steps.meta.outputs.ver }}_Slim_Pack
          path: release-slim/*.zip
